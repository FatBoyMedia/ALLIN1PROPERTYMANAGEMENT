<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Work Gallery | All In 1 Property Management</title>

<link rel="icon" type="image/jpeg" href="assets/logo.jpg">
<link rel="shortcut icon" type="image/jpeg" href="assets/logo.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0f14;
--line:rgba(255,255,255,.10);
--text:#e8eef6;
--max:1120px;
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
}

.container{
width:min(100%, calc(var(--max) + 40px));
margin:auto;
padding:0 20px;
}

/* HEADER */

header{
position:sticky;
top:0;
background:rgba(11,15,20,.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
z-index:1000;
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 0;
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:14px;
}

.logo{
height:60px;
}

.logo img{
height:100%;
}

.brand-text strong{
font-family:Oswald;
font-size:20px;
}

.brand-text span{
font-size:12px;
opacity:.7;
display:block;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 16px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.05);
font-weight:800;
font-size:13px;
}

.btn.primary{
background:#f59e0b;
color:#151515;
border:none;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
padding:40px 0;
}

@media(max-width:900px){
.gallery{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:500px){
.gallery{grid-template-columns:1fr}
}

.tile{
border-radius:16px;
overflow:hidden;
border:1px solid var(--line);
cursor:pointer;
}

.tile img,
.tile video{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:2000;
}

.lightbox.open{
display:flex;
}

.lightbox img,
.lightbox video{
max-width:100%;
max-height:90vh;
}

</style>
</head>

<body>

<header>
<div class="container nav">

<a class="brand" href="./index.html">
<div class="logo">
<img src="assets/logo.jpg">
</div>
<div class="brand-text">
<strong>All In 1</strong>
<span>Property Management</span>
</div>
</a>

<div style="display:flex;gap:10px;">
<a class="btn" href="index.html">Home</a>
<a class="btn primary" href="tel:+17059271666">Call 705-927-1666</a>
</div>

</div>
</header>

<main class="container">

<div id="gallery" class="gallery"></div>

</main>


<div id="lightbox" class="lightbox"></div>


<script>

const gallery = document.getElementById("gallery")
const lightbox = document.getElementById("lightbox")

function openLightbox(src,type){

lightbox.innerHTML=""

if(type==="video"){

let v=document.createElement("video")
v.src=src
v.controls=true
v.autoplay=true

lightbox.appendChild(v)

}else{

let img=document.createElement("img")
img.src=src
lightbox.appendChild(img)

}

lightbox.classList.add("open")

}

lightbox.onclick=()=>lightbox.classList.remove("open")


async function loadGallery(){

const repo="ALLIN1PROPERTYMANAGEMENT"
const owner="fatboymedia"

const url=`https://api.github.com/repos/${owner}/${repo}/contents/assets/work`

let res=await fetch(url)
let files=await res.json()

files.forEach(file=>{

let name=file.name.toLowerCase()

if(name.endsWith(".jpg")||name.endsWith(".jpeg")||name.endsWith(".png")||name.endsWith(".webp")){

let img=document.createElement("img")
img.src=file.download_url

let tile=document.createElement("div")
tile.className="tile"
tile.appendChild(img)

tile.onclick=()=>openLightbox(file.download_url,"img")

gallery.appendChild(tile)

}

if(name.endsWith(".mp4")||name.endsWith(".mov")||name.endsWith(".webm")){

let vid=document.createElement("video")
vid.src=file.download_url
vid.muted=true
vid.loop=true
vid.autoplay=true

let tile=document.createElement("div")
tile.className="tile"
tile.appendChild(vid)

tile.onclick=()=>openLightbox(file.download_url,"video")

gallery.appendChild(tile)

}

})

}

loadGallery()

</script>

</body>
</html>
